version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - '4173:4173'
    depends_on:
      - backend

volumes:
  mongo-data:
